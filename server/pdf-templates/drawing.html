<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현장 피해상황 도면</title>
  <style>
    @page {
      size: A4;
      margin: 10mm;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
    }
    
    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      font-size: 10pt;
      line-height: 1.4;
      color: #000;
      background: #fff;
    }
    
    .document {
      width: 100%;
      height: 100%;
      max-width: 210mm;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }
    
    .header-bar {
      background-color: #333;
      color: #fff;
      padding: 4mm 6mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .header-title {
      font-size: 14pt;
      font-weight: bold;
    }
    
    .header-info {
      display: flex;
      gap: 15mm;
      font-size: 9pt;
    }
    
    .header-item {
      display: flex;
      gap: 2mm;
    }
    
    .header-label {
      font-weight: bold;
    }
    
    .header-value {
      color: #ccc;
    }
    
    .info-bar {
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-top: none;
      padding: 3mm 6mm;
      display: flex;
      flex-wrap: wrap;
      gap: 8mm;
      flex-shrink: 0;
    }
    
    .info-item {
      display: flex;
      gap: 2mm;
      font-size: 9pt;
    }
    
    .info-label {
      font-weight: bold;
      color: #666;
    }
    
    .info-value {
      color: #333;
    }
    
    .drawing-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5mm;
      border: 1px solid #ddd;
      border-top: none;
      background-color: #fafafa;
      min-height: 200mm;
      overflow: hidden;
    }
    
    .drawing-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    
    .no-image {
      color: #999;
      font-size: 12pt;
      text-align: center;
    }
    
    .footer {
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-top: none;
      padding: 2mm 6mm;
      text-align: center;
      font-size: 8pt;
      color: #666;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="document">
    <div class="header-bar">
      <div class="header-title">현장 피해상황 도면</div>
      <div class="header-info">
        <div class="header-item">
          <span class="header-label">접수번호:</span>
          <span class="header-value">{{caseNumber}}</span>
        </div>
      </div>
    </div>
    
    <div class="info-bar">
      <div class="info-item">
        <span class="info-label">고객사:</span>
        <span class="info-value">{{insuranceCompany}}</span>
      </div>
      <div class="info-item">
        <span class="info-label">피보험자:</span>
        <span class="info-value">{{insuredName}}</span>
      </div>
      <div class="info-item">
        <span class="info-label">주소:</span>
        <span class="info-value">{{address}}</span>
      </div>
    </div>
    
    <div class="drawing-container">
      {{#if drawingImageUrl}}
      <img src="{{drawingImageUrl}}" alt="현장 피해상황 도면" class="drawing-image" />
      {{else}}
      <div class="no-image">도면 이미지가 없습니다.</div>
      {{/if}}
    </div>
    
    <div class="footer">
      작성일: {{documentDate}} | 사고접수번호: {{insuranceAccidentNo}}
    </div>
  </div>
</body>
</html>
