<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현장 피해/복구 면적 산출표</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @page {
      size: A4;
      margin: 10mm 8mm;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      font-size: 9pt;
      line-height: 1.4;
      color: #000;
      background: #fff;
    }
    
    .document {
      width: 100%;
      max-width: 210mm;
      margin: 0 auto;
    }
    
    .title {
      font-size: 14pt;
      font-weight: bold;
      margin-bottom: 5mm;
      padding-bottom: 2mm;
      border-bottom: 1px solid #000;
    }
    
    .header-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 5mm;
    }
    
    .header-table th,
    .header-table td {
      border: 1px solid #000;
      padding: 2mm 3mm;
      font-size: 9pt;
    }
    
    .header-table th {
      background-color: #f0f0f0;
      font-weight: bold;
      text-align: center;
      width: 12%;
    }
    
    .header-table td {
      text-align: left;
    }
    
    .unit-label {
      text-align: right;
      margin-bottom: 2mm;
      font-size: 9pt;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .data-table th,
    .data-table td {
      border: 1px solid #000;
      padding: 1.5mm 2mm;
      font-size: 8pt;
      vertical-align: middle;
    }
    
    .data-table th {
      background-color: #e8e8e8;
      font-weight: bold;
      text-align: center;
    }
    
    .data-table td {
      text-align: center;
    }
    
    .data-table .text-left {
      text-align: left;
    }
    
    .data-table .text-right {
      text-align: right;
    }
    
    .category-cell {
      background-color: #f5f5f5;
      font-weight: bold;
    }
    
    .sub-header {
      background-color: #f0f0f0;
    }
    
    .footer {
      margin-top: 5mm;
      text-align: right;
      font-size: 8pt;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="document">
    <div class="title">3. 현장 피해/복구 면적 산출표</div>
    
    <table class="header-table">
      <tbody>
        <tr>
          <th>접수번호</th>
          <td>{{caseNumber}}</td>
          <th>고객사</th>
          <td>{{insuranceCompany}}</td>
          <th>고객사 번호</th>
          <td>{{insuranceAccidentNo}}</td>
        </tr>
        <tr>
          <th>장소</th>
          <td colspan="3">{{address}}</td>
          <th>작성일자</th>
          <td>{{documentDate}}</td>
        </tr>
      </tbody>
    </table>
    
    <div class="unit-label">단위: ㎡</div>
    
    <table class="data-table">
      <thead>
        <tr>
          <th rowspan="2" style="width:8%">구분</th>
          <th rowspan="2" style="width:10%">공사내용</th>
          <th rowspan="2" style="width:12%">공사분류</th>
          <th colspan="3" style="width:24%">피해면적</th>
          <th colspan="3" style="width:24%">복구면적</th>
          <th rowspan="2" style="width:12%">비고</th>
        </tr>
        <tr class="sub-header">
          <th style="width:8%">면적</th>
          <th style="width:8%">가로</th>
          <th style="width:8%">세로</th>
          <th style="width:8%">면적</th>
          <th style="width:8%">가로</th>
          <th style="width:8%">세로</th>
        </tr>
      </thead>
      <tbody id="area-rows">
        {{areaRowsHtml}}
      </tbody>
    </table>
    
    <div class="footer">
      작성일: {{documentDate}}
    </div>
  </div>
</body>
</html>
