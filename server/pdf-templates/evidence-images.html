<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>증빙자료</title>
  <style>
    @page {
      size: A4;
      margin: 10mm;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      font-size: 10pt;
      line-height: 1.4;
      color: #000;
      background: #fff;
    }
    
    .page {
      width: 100%;
      max-width: 210mm;
      min-height: 277mm;
      margin: 0 auto;
      page-break-after: always;
      display: flex;
      flex-direction: column;
    }
    
    .page:last-child {
      page-break-after: avoid;
    }
    
    .header-bar {
      background-color: #333;
      color: #fff;
      padding: 3mm 5mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .header-title {
      font-size: 12pt;
      font-weight: bold;
    }
    
    .header-info {
      font-size: 9pt;
    }
    
    .category-header {
      background-color: #e0e0e0;
      border: 1px solid #999;
      border-top: none;
      padding: 3mm 5mm;
      font-weight: bold;
      font-size: 11pt;
      flex-shrink: 0;
    }
    
    .subcategory-header {
      background-color: #f5f5f5;
      border: 1px solid #ccc;
      border-top: none;
      padding: 2mm 5mm;
      font-size: 10pt;
      color: #555;
      flex-shrink: 0;
    }
    
    .image-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5mm;
      border: 1px solid #ddd;
      border-top: none;
      background-color: #fafafa;
      min-height: 220mm;
      overflow: hidden;
    }
    
    .evidence-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    
    .image-info {
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-top: none;
      padding: 2mm 5mm;
      display: flex;
      justify-content: space-between;
      font-size: 8pt;
      color: #666;
      flex-shrink: 0;
    }
    
    .image-name {
      font-weight: bold;
    }
    
    .image-date {
      color: #888;
    }
    
    .no-images {
      text-align: center;
      padding: 50mm 0;
      color: #999;
      font-size: 12pt;
    }
    
    .category-section {
      page-break-before: always;
    }
    
    .category-section:first-child {
      page-break-before: avoid;
    }
  </style>
</head>
<body>
  {{#each categories}}
  <div class="category-section">
    {{#each this.subcategories}}
    {{#each this.images}}
    <div class="page">
      <div class="header-bar">
        <div class="header-title">증빙자료</div>
        <div class="header-info">접수번호: {{../../../caseNumber}}</div>
      </div>
      
      <div class="category-header">{{../../categoryName}}</div>
      <div class="subcategory-header">{{../subcategoryName}}</div>
      
      <div class="image-container">
        <img src="{{this.imageUrl}}" alt="{{this.fileName}}" class="evidence-image" />
      </div>
      
      <div class="image-info">
        <span class="image-name">{{this.fileName}}</span>
        <span class="image-date">{{this.uploadDate}}</span>
      </div>
    </div>
    {{/each}}
    {{/each}}
  </div>
  {{/each}}
  
  {{#unless hasImages}}
  <div class="page">
    <div class="header-bar">
      <div class="header-title">증빙자료</div>
      <div class="header-info">접수번호: {{caseNumber}}</div>
    </div>
    <div class="no-images">
      등록된 증빙자료가 없습니다.
    </div>
  </div>
  {{/unless}}
</body>
</html>
